name: C++ and Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install C++ dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Build checker and tests
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build .

      - name: Run CTest (validator + parallel thread test)
        run: cd build && ctest --output-on-failure

      - name: Run checker — parallel mode (expect exit 2, broken node)
        run: ./build/telecom_integration_checker config/telecom_nodes.csv || test $? -eq 2

      - name: Run checker — serial mode
        run: ./build/telecom_integration_checker config/telecom_nodes.csv --serial || test $? -eq 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest tests/ -v

      - name: Generate lab report
        run: python scripts/generate_lab_report.py

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
