apiVersion: apps/v1
kind: Deployment
metadata:
  name: telecom-integration-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telecom-integration-checker
  template:
    metadata:
      labels:
        app: telecom-integration-checker
    spec:
      containers:
        - name: checker
          image: telecom-integration-checker:latest
          imagePullPolicy: IfNotPresent
